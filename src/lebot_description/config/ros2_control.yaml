/**/controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    use_sim_time: true
    lebot_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
      use_sim_time: true
    lebot_diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

/**/lebot_diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_front_wheel_joint", "left_back_wheel_joint"]
    right_wheel_names: ["right_front_wheel_joint", "right_back_wheel_joint"]

    wheel_separation: 0.20
    wheel_radius: 0.05
    wheels_per_side: 2
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    linear:
      x:
        max_velocity: 0.5
        max_acceleration: 1.0
    angular:
      z:
        max_velocity: 1.8
        max_acceleration: 3.5

    publish_rate: 50.0
    tf_frame_prefix_enable: true
    tf_frame_prefix: ""
    odom_frame_id: odom
    base_frame_id: base_footprint
    pose_covariance_diagonal : [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.0, 0.0, 0.0, 0.0, 0.01]

    open_loop: false
    enable_odom_tf: true

    cmd_vel_timeout: 0.5
    use_stamped_vel: false